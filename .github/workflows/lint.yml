name: Lint

on:
  push:
    branches: [main]
    paths:
      [
        birdnet_analyzer/**,
        .github/workflows/lint.yml,
        tests/**,
        pyproject.toml,
      ]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
    paths:
      [
        birdnet_analyzer/**,
        .github/workflows/lint.yml,
        tests/**,
        pyproject.toml,
      ]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Lint with Ruff
        run: |
          ruff check
